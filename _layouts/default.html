<!DOCTYPE html>
<html lang="it">
<head>
  <meta charset="UTF-8">
  <title>{{ page.title }}</title>
  <link rel="stylesheet" href="/css/style.css">
</head>
<body>

<!-- =========================
     HEADER
========================= -->
<header class="site-header">
  <div class="container header-grid">
    <!-- Logo a sinistra -->
    <div class="header-logo">
      <a href="/"><img src="/img/logo.png" alt="Logo Azienda"></a>
    </div>

    <!-- Menu, CTA e selettore lingua a destra -->
    <div class="header-menu-wrapper">
      <nav class="header-menu">
        <a href="/">Home</a>
        <a href="/chi-siamo">Chi siamo</a>
        <a href="/bnb">B&B</a>
        <a href="/contatti">Contatti</a>
      </nav>

      <a href="/contatti" class="cta-button">Contattaci</a>

      <div class="language-selector">
        <select>
          <option value="it" selected>IT</option>
          <option value="en">EN</option>
          <option value="fr">FR</option>
        </select>
      </div>
    </div>
  </div>
</header>

<!-- =========================
     CONTENT
========================= -->
{{ content }}

<!-- =========================
     FOOTER
========================= -->
<footer class="site-footer">
  <div class="container footer-grid">
    <!-- Logo -->
    <div class="footer-logo">
      <img src="/img/logo.png" alt="Logo Azienda">
    </div>

    <!-- Informazioni aziendali -->
    <div class="footer-info">
      <h3>La nostra azienda</h3>
      <p>Via Roma 123, 00100 Roma</p>
      <p>Email: info@tuaazienda.com</p>
      <p>Telefono: +39 06 1234567</p>
    </div>

    <!-- Collegamenti alle pagine -->
    <div class="footer-links">
      <h3>Collegamenti utili</h3>
      <ul>
        <li><a href="/">Home</a></li>
        <li><a href="/chi-siamo">Chi siamo</a></li>
        <li><a href="/bnb">B&B</a></li>
        <li><a href="/contatti">Contatti</a></li>
      </ul>
    </div>
  </div>

  <div class="footer-bottom">
    <p>&copy; 2026 Tua Azienda. Tutti i diritti riservati.</p>
  </div>
</footer>

</body>
</html>

<!DOCTYPE html>
<html lang="it">
<head>
  <meta charset="UTF-8">
  <title>{{ page.title }}</title>
  <link rel="stylesheet" href="/css/style.css">
</head>
<body>

<!-- =========================
     HEADER
========================= -->
<header class="site-header" id="top">
  <div class="container header-grid">
    <!-- Logo -->
    <div class="header-logo">
      <a href="#top"><img src="/img/logo.jpg" alt="Logo Azienda"></a>
    </div>

    <!-- Menu e CTA -->
    <div class="header-menu-wrapper">
      <nav class="header-menu">
        <a href="#top" data-key="menu_home">Home</a>
        <a href="#chi-siamo" data-key="menu_chi_siamo">Chi siamo</a>
        <a href="#bnb" data-key="menu_bnb">B&B</a>
      </nav>

      <!-- Selettore lingua -->
      <div class="language-selector">
        <img src="/img/flags/it.png" class="flag active" data-lang="it" alt="IT">
        <img src="/img/flags/en.png" class="flag" data-lang="en" alt="EN">
        <img src="/img/flags/fr.png" class="flag" data-lang="fr" alt="FR">
      </div>

      <a href="#prenota" class="cta-button" data-key="cta_prenota">Prenota</a>
    </div>
  </div>
</header>

<!-- =========================
     CONTENUTO DELLA PAGINA
========================= -->
{{ content }}

<!-- =========================
     FOOTER
========================= -->
<footer class="site-footer">
  <div class="container footer-grid">
    <div class="footer-logo">
      <img src="/img/logo.jpg" alt="Logo Azienda">
    </div>
    <div class="footer-info">
      <h3>La nostra azienda</h3>
      <p>Via Roma 123, 00100 Roma</p>
      <p>Email: info@tuaazienda.com</p>
      <p>Telefono: +39 06 1234567</p>
    </div>
    <div class="footer-links">
      <h3>Collegamenti utili</h3>
      <ul>
        <li><a href="#top">Home</a></li>
        <li><a href="#chi-siamo">Chi siamo</a></li>
        <li><a href="#bnb">B&B</a></li>
        <li><a href="#prenota">Prenota</a></li>
      </ul>
    </div>
  </div>
  <div class="footer-bottom">
    <p>&copy; 2026 Tua Azienda. Tutti i diritti riservati.</p>
  </div>
</footer>

<script>
  // FAQ accordion
  document.querySelectorAll('.accordion-question').forEach(button => {
    button.addEventListener('click', () => {
      const item = button.parentElement;
      document.querySelectorAll('.accordion-item').forEach(i => { if(i !== item) i.classList.remove('active'); });
      item.classList.toggle('active');
    });
  });
</script>

</body>
</html>
